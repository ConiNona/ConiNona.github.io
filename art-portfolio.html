    <defs>
      <filter id="paper-rip" x="-3%" y="-3%" width="106%" height="106%">
        <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="2" seed="4" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="9"/>

      <filter id="paper-rip-soft" x="-3%" y="-3%" width="106%" height="106%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="9" result="noise"/>

    /* ─── HOOKS ──────────────────────────────── */
    function useInView(threshold = 0.12) {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { setInView(true); obs.disconnect(); } },
          { threshold }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [threshold]);
      return [ref, inView];
    }

    function useTypewriter(phrases, resetKey, typingSpeed = 60, deleteSpeed = 30, pauseMs = 2200) {
      const [display, setDisplay] = useState("");
      const [phaseIdx, setPhaseIdx] = useState(0);
      const [charIdx, setCharIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);
      const [pausing, setPausing] = useState(false);
      useEffect(() => { setDisplay(""); setPhaseIdx(0); setCharIdx(0); setDeleting(false); setPausing(false); }, [resetKey]);
      useEffect(() => {
        if (pausing) { const t = setTimeout(() => { setPausing(false); setDeleting(true); }, pauseMs); return () => clearTimeout(t); }
        const current = phrases[phaseIdx];
        if (!deleting && charIdx < current.length) { const t = setTimeout(() => { setCharIdx(c => c + 1); setDisplay(current.slice(0, charIdx + 1)); }, typingSpeed); return () => clearTimeout(t); }
        if (!deleting && charIdx === current.length) { setPausing(true); return; }
        if (deleting && charIdx > 0) { const t = setTimeout(() => { setCharIdx(c => c - 1); setDisplay(current.slice(0, charIdx - 1)); }, deleteSpeed); return () => clearTimeout(t); }
        if (deleting && charIdx === 0) { setDeleting(false); setPhaseIdx(i => (i + 1) % phrases.length); }
      }, [charIdx, deleting, pausing, phaseIdx, phrases, typingSpeed, deleteSpeed, pauseMs]);
      return display;
    }

    function Reveal({ children, delay = 0, from = "bottom", style = {} }) {
      const [ref, inView] = useInView();
      const transforms = {
        bottom: "translateY(40px)", left: "translateX(-40px)", right: "translateX(40px)",
        scale: "scale(0.9)", tilt: "rotate(-5deg) translateY(28px)", tiltR: "rotate(5deg) translateY(28px)",
      };
      return (
        <div ref={ref} style={{
          opacity: inView ? 1 : 0,
          transform: inView ? "none" : transforms[from],
          transition: `opacity 1s cubic-bezier(.22,1,.36,1) ${delay}s, transform 1s cubic-bezier(.22,1,.36,1) ${delay}s`,
          ...style,
        }}>{children}</div>
      );
    }

    function HungPhoto({ label, index, accent, size = "medium", ratio, src }) {
      const [hover, setHover] = useState(false);

      const styles = [
        { frame: "linear-gradient(135deg, #6b4a2a 0%, #3a2814 100%)", inner: "#1a0e08", tint: "sepia(0.5) contrast(1.05)" },

        { frame: "linear-gradient(135deg, #5a3a2a 0%, #2a1810 100%)", inner: "#100a06", tint: "sepia(0.6)" },
      ];
      const style = styles[index % styles.length];
      const sizes = { small: { ratio: "4 / 5", padding: 10 }, medium: { ratio: "1 / 1.2", padding: 12 }, large: { ratio: "3 / 4", padding: 16 } };
      /* If an explicit ratio is passed, it overrides the size preset so the frame matches the actual photo orientation. */
      if (ratio) sizes[size] = { ...sizes[size], ratio };
      const sz = sizes[size];

      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: "100%" }}>
          <svg width="20" height="14" style={{ marginBottom: -2 }}>
            <polygon points="10,0 4,8 16,8" fill={accent}/>

            onMouseEnter={() => setHover(true)}
            onMouseLeave={() => setHover(false)}
            style={{
              background: style.frame, padding: sz.padding,
              boxShadow: hover
                ? "0 22px 42px rgba(0,0,0,0.75), inset 0 1px 2px rgba(255,255,255,0.2)"
                : "0 14px 26px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.15)",
              transition: "transform 0.4s, box-shadow 0.4s",
              transform: hover ? "translateY(-4px) rotate(-0.5deg)" : "none",
              width: "100%",

            <div style={{

                  style={{ position: "absolute", width: 1, height: 1, opacity: 0, pointerEvents: "none" }}/>}
                {/* invisible overlay that intercepts right-click/drag on photo */}
                {src && !errored && <div style={{ position: "absolute", inset: 0, zIndex: 2, background: "transparent" }}
                  onContextMenu={e => e.preventDefault()} onDragStart={e => e.preventDefault()}/>}

    /* ─── ROOT ───────────────────────────────── */
    function ArtPortfolio() {
      const [lang, setLang] = useState(() => localStorage.getItem('art-portfolio-lang') || 'en');
      useEffect(() => { localStorage.setItem('art-portfolio-lang', lang); }, [lang]);
      const T = TRANSLATIONS[lang];

      // When this page is opened with a hash like #photo or #graphite, React has not
      // rendered the target section by the time the browser tries to honor the hash.
      // Re-scroll to it after mount so back-from-subpage links jump to the right place.
      useEffect(() => {
        const hash = window.location.hash;
        if (!hash) return;
        const tryScroll = () => {
          const el = document.querySelector(hash);
          if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "start" });
            return true;
          }
          return false;
        };
        // give the layout a tick to settle, then a couple of fallbacks
        const t1 = setTimeout(tryScroll, 80);
        const t2 = setTimeout(tryScroll, 400);
        const t3 = setTimeout(tryScroll, 1000);
        return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
      }, []);

      return (
        <LangCtx.Provider value={{ lang, setLang, T }}>
          <CursorBlob />
          <Nav />
          <Hero />
          <Intro />
          <FilmSection />
          <PhotoSection />
          <GraphiteSection />
          <SculptureSection />
          <WatercolorSection />
          <MarkersSection />
          <CollagesSection />
          <DanceSection />
          <Footer />
        </LangCtx.Provider>
      );
    }
