    /* ─── HOOKS ──────────────────────────────── */
    function useInView(threshold = 0.12) {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { setInView(true); obs.disconnect(); } },
          { threshold }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [threshold]);
      return [ref, inView];
    }

    function useTypewriter(phrases, resetKey, typingSpeed = 65, deleteSpeed = 35, pauseMs = 2200) {
      const [display, setDisplay] = useState("");
      const [phaseIdx, setPhaseIdx] = useState(0);
      const [charIdx, setCharIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);
      const [pausing, setPausing] = useState(false);

      useEffect(() => {
        setDisplay(""); setPhaseIdx(0); setCharIdx(0); setDeleting(false); setPausing(false);
      }, [resetKey]);

      useEffect(() => {
        if (pausing) {
          const t = setTimeout(() => { setPausing(false); setDeleting(true); }, pauseMs);
          return () => clearTimeout(t);
        }
        const current = phrases[phaseIdx];
        if (!deleting && charIdx < current.length) {
          const t = setTimeout(() => { setCharIdx(c => c + 1); setDisplay(current.slice(0, charIdx + 1)); }, typingSpeed);
          return () => clearTimeout(t);
        }
        if (!deleting && charIdx === current.length) { setPausing(true); return; }
        if (deleting && charIdx > 0) {
          const t = setTimeout(() => { setCharIdx(c => c - 1); setDisplay(current.slice(0, charIdx - 1)); }, deleteSpeed);
          return () => clearTimeout(t);
        }
        if (deleting && charIdx === 0) { setDeleting(false); setPhaseIdx(i => (i + 1) % phrases.length); }
      }, [charIdx, deleting, pausing, phaseIdx, phrases, typingSpeed, deleteSpeed, pauseMs]);

      return display;
    }

    /* ─── MOBILE HOOK ────────────────────────── */
    function useIsMobile() {
      const [isMobile, setIsMobile] = useState(() => window.innerWidth <= 700);
      useEffect(() => {

        window.addEventListener('resize', h);
        return () => window.removeEventListener('resize', h);
      }, []);
      return isMobile;

    /* ─── REVEAL ─────────────────────────────── */
    function Reveal({ children, delay = 0, from = "bottom", style = {} }) {
      const [ref, inView] = useInView();

      return (

          opacity: inView ? 1 : 0,
          transform: inView ? "none" : transforms[from],
          transition: `opacity 0.75s cubic-bezier(.22,1,.36,1) ${delay}s, transform 0.75s cubic-bezier(.22,1,.36,1) ${delay}s`,
          ...style,
        }}>
          {children}
        </div>

      return (
        <div style={{
          position: 'fixed',
          ...(isMobile

    /* ─── CURSOR GLOW ────────────────────────── */
    function CursorGlow() {
      const [pos, setPos] = useState({ x: -300, y: -300 });
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const move = (e) => { setPos({ x: e.clientX, y: e.clientY }); setVisible(true); };
        const leave = () => setVisible(false);
        window.addEventListener("mousemove", move);
        window.addEventListener("mouseleave", leave);
        return () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseleave", leave); };
      }, []);
      return (
        <div style={{ position: "fixed", pointerEvents: "none", zIndex: 9999, left: pos.x-200, top: pos.y-200, width: 400, height: 400, borderRadius: "50%", background: `radial-gradient(circle, ${C.accent}18 0%, transparent 65%)`, opacity: visible ? 1 : 0, transition: "opacity 0.4s, left 0.08s linear, top 0.08s linear" }}/>
      );
    }

    /* ─── ANZA GLOW TEXT ─────────────────────── */
    function AnzaGlowText({ lang }) {
      const pRef = useRef(null);
      useEffect(() => {
        const handler = (e) => {
          if (!pRef.current) return;
          const rect = pRef.current.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
          const t = Math.max(0, 1 - dist / 220);
          if (t > 0.01) {
            const spread = Math.round(6 + t * 18);
            const alpha = Math.round(t * 180).toString(16).padStart(2, '0');
            pRef.current.style.textShadow = `0 0 ${spread}px #c4728a${alpha}`;
          } else {
            pRef.current.style.textShadow = 'none';
          }
        };
        window.addEventListener('mousemove', handler);
        return () => window.removeEventListener('mousemove', handler);
      }, []);
      return (
        <p ref={pRef} style={{ fontSize: 14, color: C.textDim, marginTop: 8, transition: 'text-shadow 0.2s ease' }}>
          {lang === 'es' ? 'También la creativa detrás de ' : 'Also the creative behind '}
          <a href="art-portfolio.html" target="_blank" rel="noreferrer"
            style={{ color: C.accent, textDecoration: "none", borderBottom: `1px solid ${C.accentDark}`, paddingBottom: 1, transition: "color 0.2s, border-color 0.2s" }}
            onMouseEnter={e => { e.currentTarget.style.color = C.accentLight; e.currentTarget.style.borderColor = C.accentLight; }}
            onMouseLeave={e => { e.currentTarget.style.color = C.accent; e.currentTarget.style.borderColor = C.accentDark; }}
          >Anza by ck.</a>
        </p>
      );
    }

    /* ─── NAV ────────────────────────────────── */
    const NAV_PROJECT_LINKS = [
      { title: "Dear Keira: A Digital Birthday Card", href: "project-framer.html", color: "#9b6dbd" },
      { title: "CMarine Surveyors Website",            href: "project-cmarine.html", color: "#3a8fc7" },
      { title: "Video Production & Editing",           href: "project-youtube.html", color: "#d94f4f" },
    ];

    function Nav() {
      const { lang, setLang, T } = useContext(LangCtx);
      const isMobile = useIsMobile();
      const [scrolled, setScrolled] = useState(false);
      const [dropOpen, setDropOpen] = useState(false);
      const [hoveredIdx, setHoveredIdx] = useState(null);
      const [dropRect, setDropRect] = useState(null);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const projRef = useRef(null);
      const closeTimer = useRef(null);

      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 40);
        window.addEventListener("scroll", h);
        return () => window.removeEventListener("scroll", h);
      }, []);


      const openDrop = () => {
        clearTimeout(closeTimer.current);
        if (projRef.current) setDropRect(projRef.current.getBoundingClientRect());
        setDropOpen(true);
      };
      const closeDrop = () => { closeTimer.current = setTimeout(() => setDropOpen(false), 80); };
      const cancelClose = () => clearTimeout(closeTimer.current);

      const navLink = (href, label) => (
        <a href={href} style={{ color: C.textMuted, fontSize: 13, textDecoration: "none", transition: "color 0.2s", letterSpacing: "0.05em" }}
          onMouseEnter={e => e.target.style.color = C.accent}
          onMouseLeave={e => e.target.style.color = C.textMuted}
        >{label}</a>
      );

      const LangBtn = ({ code }) => {
        const active = lang === code;
        return (
          <button onMouseDown={e => { e.preventDefault(); setLang(code); }} style={{ background: "none", border: "none", cursor: active ? "default" : "pointer", fontSize: 12, fontWeight: active ? 700 : 400, color: active ? C.accent : C.textMuted, letterSpacing: "0.08em", padding: "6px 8px", borderBottom: active ? `1px solid ${C.accent}` : "1px solid transparent", transition: "color 0.2s, border-color 0.2s" }}
            onMouseEnter={e => { if (!active) e.currentTarget.style.color = C.text; }}
            onMouseLeave={e => { if (!active) e.currentTarget.style.color = C.textMuted; }}
          >
            {code.toUpperCase()}
          </button>
        );
      };

      /* Dropdown rendered as a portal at document.body so backdrop-filter works */
      const dropdownPortal = dropOpen && dropRect && ReactDOM.createPortal(
        <div
          style={{
            position: "fixed",
            top: dropRect.bottom + 8,
            right: window.innerWidth - dropRect.right - 4,
            zIndex: 9999,
          }}
          onMouseEnter={cancelClose}
          onMouseLeave={closeDrop}
        >
          <div style={{
            background: "rgba(15,15,15,0.45)",
            border: "1px solid rgba(255,255,255,0.10)",
            borderRadius: 4,
            padding: "6px",
            minWidth: 260,
            backdropFilter: "blur(40px) saturate(1.5)",
            WebkitBackdropFilter: "blur(40px) saturate(1.5)",
            boxShadow: "0 12px 32px rgba(0,0,0,0.5), 0 4px 10px rgba(0,0,0,0.3)",
          }}>
            {NAV_PROJECT_LINKS.map(({ title, href, color }, idx) => (
              <a key={href} href={href}
                onMouseEnter={() => setHoveredIdx(idx)}
                onMouseLeave={() => setHoveredIdx(null)}
                style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "9px 14px", borderRadius: 2,
                  color: hoveredIdx === idx ? color : C.textMuted,
                  fontSize: 12, letterSpacing: "0.04em", textDecoration: "none",
                  background: hoveredIdx === idx ? `${color}12` : "transparent",
                  transition: "background 0.15s, color 0.15s",
                }}
              >
                <span style={{ width: 7, height: 7, borderRadius: "50%", background: color, flexShrink: 0, opacity: hoveredIdx === idx ? 1 : 0.45, transition: "opacity 0.15s" }}/>
                {title}
              </a>
            ))}
          </div>
        </div>,
        document.body
      );

      const mobileMenu = isMobile && mobileMenuOpen && ReactDOM.createPortal(
        <div style={{
          position: "fixed", top: 56, left: 0, right: 0, bottom: 0, zIndex: 98,
          background: `${C.bg}f4`,
          backdropFilter: "blur(20px)",
          WebkitBackdropFilter: "blur(20px)",
          display: "flex", flexDirection: "column",
          padding: "0.5rem 1.5rem 2rem",
        }}>
          {[
            { href: "#about",    label: T.nav.about },
            { href: "#skills",   label: T.nav.skills },
            { href: "#projects", label: T.nav.projects },
            { href: "#contact",  label: T.nav.contact },
          ].map(({ href, label }) => (
            <a key={href} href={href}
              onClick={() => setMobileMenuOpen(false)}
              style={{ color: C.textMuted, fontSize: 16, textDecoration: "none", padding: "18px 0", borderBottom: `1px solid ${C.border}`, letterSpacing: "0.06em", display: "block" }}
            >{label}</a>
          ))}
          <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 20 }}>
            <LangBtn code="en" /><span style={{ color: C.textDim, fontSize: 11 }}>|</span><LangBtn code="es" />
          </div>
        </div>,
        document.body
      );

      return (
        <>
          <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, padding: isMobile ? "0 1rem" : "0 2rem", height: 56, display: "flex", alignItems: "center", justifyContent: "space-between", background: scrolled ? `${C.bg}ee` : "transparent", borderBottom: scrolled ? `1px solid ${C.border}` : "1px solid transparent", backdropFilter: scrolled ? "blur(12px)" : "none", transition: "background 0.3s, border-color 0.3s" }}>
            <a href="#" onClick={e => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); setMobileMenuOpen(false); }} style={{ fontSize: 24, fontWeight: 600, letterSpacing: "0.1em", color: C.text, fontFamily: "'Playfair Display', serif", textDecoration: 'none', cursor: 'pointer' }}>CK<span style={{ display: "inline-block", width: 4, height: 4, background: C.accent, marginLeft: 2, verticalAlign: "baseline" }} /></a>
            {isMobile ? (
              <button
                onClick={() => setMobileMenuOpen(o => !o)}
                style={{ background: "none", border: "none", cursor: "pointer", padding: "8px 4px", display: "flex", flexDirection: "column", gap: 5, alignItems: "flex-end" }}
                aria-label="Toggle menu"
              >
                <span style={{ display: "block", width: 22, height: 2, background: mobileMenuOpen ? C.accent : C.textMuted, borderRadius: 2, transition: "all 0.25s ease", transform: mobileMenuOpen ? "translateY(7px) rotate(45deg)" : "none" }}/>
                <span style={{ display: "block", width: 22, height: 2, background: mobileMenuOpen ? C.accent : C.textMuted, borderRadius: 2, transition: "all 0.25s ease", opacity: mobileMenuOpen ? 0 : 1 }}/>
                <span style={{ display: "block", width: 22, height: 2, background: mobileMenuOpen ? C.accent : C.textMuted, borderRadius: 2, transition: "all 0.25s ease", transform: mobileMenuOpen ? "translateY(-7px) rotate(-45deg)" : "none" }}/>
              </button>
            ) : (
              <div style={{ display: "flex", gap: 28, alignItems: "center" }}>
                {navLink("#about", T.nav.about)}
                {navLink("#skills", T.nav.skills)}

                {/* Projects nav item — dropdown rendered via portal */}
                <div
                  ref={projRef}
                  style={{ position: "relative" }}
                  onMouseEnter={openDrop}
                  onMouseLeave={closeDrop}
                >
                  <a href="#projects" style={{ color: dropOpen ? C.accent : C.textMuted, fontSize: 13, textDecoration: "none", transition: "color 0.2s", letterSpacing: "0.05em" }}>
                    {T.nav.projects}
                  </a>
                </div>

                {navLink("#contact", T.nav.contact)}
                <div style={{ display: "flex", alignItems: "center", gap: 4, marginLeft: 8 }}>
                  <LangBtn code="en" /><span style={{ color: C.textDim, fontSize: 11 }}>|</span><LangBtn code="es" />
                </div>
              </div>
            )}
          </nav>
          {!isMobile && dropdownPortal}
          {mobileMenu}
        </>
      );
    }

    /* ─── DIVIDER ────────────────────────────── */
    function Divider() {
      const isMobile = useIsMobile();
      return <div style={{ width: "100%", height: 1, background: `linear-gradient(90deg, transparent, ${C.border}, transparent)`, margin: isMobile ? "1.75rem 0" : "3.5rem 0" }}/>;
    }

    /* ─── MAIN APP ───────────────────────────── */
    function Portfolio() {
      const isMobile = useIsMobile();
      const [lang, setLang] = useState(() => localStorage.getItem('portfolio-lang') || 'en');
      useEffect(() => { localStorage.setItem('portfolio-lang', lang); }, [lang]);
      useEffect(() => {
        if (!window.location.hash) return;
        const id = window.location.hash.slice(1);
        const tryScroll = (attempts) => {
          const el = document.getElementById(id);
          if (el) { el.scrollIntoView({ behavior: 'smooth' }); }
          else if (attempts < 15) { setTimeout(() => tryScroll(attempts + 1), 80); }
        };
        setTimeout(() => tryScroll(0), 100);
      }, []);

      /* Restore scroll position when returning from a project page */
      useEffect(() => {
        const savedY = sessionStorage.getItem('portfolio-scroll');
        if (savedY !== null) {
          sessionStorage.removeItem('portfolio-scroll');
          requestAnimationFrame(() => window.scrollTo(0, parseInt(savedY, 10)));
        }
      }, []);
      const T = TRANSLATIONS[lang];
      const typed = useTypewriter(T.phrases, lang);
      const [photoErr, setPhotoErr] = useState(false);

      return (
        <LangCtx.Provider value={{ lang, setLang, T }}>
          <div style={{ background: C.bg, minHeight: "100vh" }}>
            <CursorGlow />
            <ScrollHint />
            <Nav />
            <Header isMobile={isMobile} />

            {/* ── TITLE BLOCK ── */}
            <div style={{ textAlign: "center", padding: isMobile ? "0 1rem 0.5rem" : "0 1rem 1.5rem", animation: "fadeUp 0.8s ease both", marginTop: isMobile ? "-110px" : 0, position: "relative", zIndex: 2 }}>
              <h1 style={{ fontSize: "clamp(1.8rem, 5vw, 3rem)", fontWeight: 700, letterSpacing: "-0.02em", fontFamily: "'Playfair Display', serif", textShadow: isMobile ? "0 2px 12px rgba(0,0,0,0.85), 0 1px 4px rgba(0,0,0,0.95)" : "none" }}>
                Constanza Kostyushko
              </h1>
              <div style={{ marginTop: "0.9rem", minHeight: "1.6em", display: "flex", alignItems: "center", justifyContent: "center", gap: 2 }}>
                <span style={{ color: C.accent, fontSize: "clamp(0.9rem, 2.5vw, 1.1rem)", fontWeight: 400, textShadow: isMobile ? "0 1px 8px rgba(0,0,0,0.8)" : "none" }}>{typed}</span>
                <span style={{ color: C.accent, animation: "blink 1s step-end infinite", fontSize: "1.1rem" }}>|</span>
              </div>
            </div>

            <main style={{ maxWidth: 960, margin: "0 auto", padding: isMobile ? "2.75rem 1.25rem 5rem" : "1rem 1.5rem 5rem" }}>
              <Divider />

              {/* ── ABOUT ── */}
              <section id="about" style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr auto", gap: isMobile ? 0 : "3rem", alignItems: "center" }}>
                <Reveal from="left">
                  <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                    <h2 style={{ fontSize: "clamp(1.6rem, 4vw, 2.2rem)", fontWeight: 700, fontFamily: "'Playfair Display', serif" }}>
                      {T.about.greeting} <span style={{ color: C.accent }}>Constanza</span>
                    </h2>
                    <p style={{ fontSize: "1rem", color: C.textMuted, lineHeight: 1.8, maxWidth: 480 }}>{T.about.bio1}</p>
                    <p style={{ fontSize: "1rem", color: C.textMuted, lineHeight: 1.8, maxWidth: 480 }}>{T.about.bio2}</p>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginTop: 8 }}>
                      <a href={lang === 'es' ? 'CV_CK_ES.pdf' : 'CV_CK_EN.pdf'} target="_blank" rel="noreferrer" style={{ display: "inline-block", padding: "10px 22px", background: C.accentDark, color: C.text, borderRadius: 8, fontSize: 14, fontWeight: 500, textDecoration: "none", border: `1px solid ${C.accent}50`, transition: "background 0.25s, transform 0.2s" }}
                        onMouseEnter={e => { e.currentTarget.style.background = C.accent; e.currentTarget.style.transform = "translateY(-2px)"; }}
                        onMouseLeave={e => { e.currentTarget.style.background = C.accentDark; e.currentTarget.style.transform = "none"; }}
                      >
                        {T.about.viewCV}
                      </a>
                    </div>
                    <div style={{ display: "flex", gap: 20, marginTop: 4 }}>
                      {[
                        { key: "linkedin", href: "https://www.linkedin.com/in/constanza-kostyushko-a2909b317/", newTab: true },
                        { key: "youtube",  href: "https://www.youtube.com/@ConstanzaKr", newTab: true },
                        { key: "email",    href: "https://mail.google.com/mail/?view=cm&to=coni.nona@gmail.com", newTab: true },
                      ].map(({ key, href, newTab }) => (
                        <a key={key} href={href} target={newTab ? "_blank" : "_self"} rel="noreferrer" style={{ color: C.textMuted, fontSize: 13, textDecoration: "none", borderBottom: `1px solid ${C.textDim}`, paddingBottom: 2, transition: "color 0.2s, border-color 0.2s" }}
                          onMouseEnter={e => { e.currentTarget.style.color = C.accent; e.currentTarget.style.borderColor = C.accent; }}
                          onMouseLeave={e => { e.currentTarget.style.color = C.textMuted; e.currentTarget.style.borderColor = C.textDim; }}
                        >
                          {T.links[key]}
                        </a>
                      ))}
                    </div>
                    <AnzaGlowText lang={lang} />
                  </div>
                </Reveal>

                {isMobile && <Divider />}
                <Reveal from="right" delay={0.15}>
                  <div style={{ display: "flex", justifyContent: isMobile ? "center" : "flex-start" }}>
                  <div style={{ position: "relative" }}>
                    <div style={{ position: "absolute", inset: -6, borderRadius: "50%", border: `1px solid ${C.accentDark}`, animation: "float 5s ease-in-out infinite" }}/>
                    <div style={{ width: isMobile ? 190 : 220, height: isMobile ? 190 : 220, borderRadius: "50%", overflow: "hidden", border: `3px solid ${C.accentDark}`, background: C.surface, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      {!photoErr ? (
                        <img src="coni.jpg" alt="Constanza Kostyushko" onError={() => setPhotoErr(true)} style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "center top" }}/>
                      ) : (
                        <div style={{ textAlign: "center", color: C.textDim, fontSize: 13, padding: 16 }}>
                          <div style={{ fontSize: 40, marginBottom: 8, color: C.accentDark }}>CK</div>
                          <div style={{ fontSize: 11, fontStyle: "italic" }}>add coni.jpg</div>
                        </div>
                      )}
                    </div>
                  </div>
                  </div>
                </Reveal>
              </section>

              <Divider />

              {/* ── SKILLS ── */}
              <section id="skills">
                <Reveal>
                  <h2 style={{ fontSize: "1.5rem", fontWeight: 600, fontFamily: "'Playfair Display', serif", marginBottom: "2rem", textAlign: "center", paddingTop: isMobile ? "0.75rem" : 0 }}>
                    {T.skills.heading}
                  </h2>
                </Reveal>
                <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 20 }}>
                  {T.skills.groups.map((_, i) => <SkillGroup key={i} groupIndex={i} delay={i * 0.1} />)}
                </div>
              </section>

              <Divider />

              {/* ── PROJECTS ── */}
              <section id="projects" style={{ marginBottom: isMobile ? "1.25rem" : 0 }}>
                <Reveal>
                  <h2 style={{ fontSize: "1.5rem", fontWeight: 600, fontFamily: "'Playfair Display', serif", marginBottom: "2rem", textAlign: "center", paddingTop: isMobile ? "0.75rem" : 0 }}>
                    {T.projects.heading}
                  </h2>
                </Reveal>
                <div style={{ display: "flex", flexDirection: "column", gap: isMobile ? 16 : 24 }}>
                  {PROJECT_META.map((_, i) => <ProjectCard key={i} index={i} />)}
                </div>
              </section>

              <Divider />

              {/* ── CONTACT / FOOTER ── */}
              <section id="contact">
                <Reveal>
                  <div style={{ textAlign: "center", padding: "2rem 0 1rem" }}>
                    <h2 style={{ fontSize: "2.5rem", fontWeight: 700, fontFamily: "'Playfair Display', serif", color: C.accent, marginBottom: "1rem" }}>
                      {T.footer.heading}
                    </h2>
                    <p style={{ fontStyle: "italic", color: C.textMuted, fontSize: "1rem", fontFamily: "'Playfair Display', serif" }}>
                      {T.footer.sub}
                    </p>
                    <div style={{ display: "flex", justifyContent: "center", gap: 24, marginTop: "2rem" }}>
                      {[
                        { key: "linkedin", href: "https://www.linkedin.com/in/constanza-kostyushko-a2909b317/", newTab: true },
                        { key: "youtube",  href: "https://www.youtube.com/@ConstanzaKr", newTab: true },
                        { key: "email",    href: "https://mail.google.com/mail/?view=cm&to=coni.nona@gmail.com", newTab: true },
                      ].map(({ key, href, newTab }) => (
                        <a key={key} href={href} target={newTab ? "_blank" : "_self"} rel="noreferrer" style={{ color: C.textMuted, fontSize: 13, textDecoration: "none", borderBottom: `1px solid ${C.textDim}`, paddingBottom: 2, transition: "color 0.2s, border-color 0.2s" }}
                          onMouseEnter={e => { e.currentTarget.style.color = C.accent; e.currentTarget.style.borderColor = C.accent; }}
                          onMouseLeave={e => { e.currentTarget.style.color = C.textMuted; e.currentTarget.style.borderColor = C.textDim; }}
                        >
                          {T.links[key]}
                        </a>
                      ))}
                    </div>
                    <div style={{ marginTop: isMobile ? "2rem" : "5rem", paddingTop: "2rem", borderTop: `1px solid ${C.border}` }}>
                      <p style={{ fontSize: 12, color: C.textMuted, marginBottom: 10 }}>
                        {lang === 'es' ? 'También visita mi marca personal:' : 'Also visit my personal brand:'}
                      </p>
                      <a href="art-portfolio.html" target="_blank" rel="noreferrer"
                        style={{ fontSize: 13, color: C.accent, textDecoration: 'none', borderBottom: `1px solid ${C.accentDark}`, paddingBottom: 2, transition: 'color 0.2s, border-color 0.2s' }}
                        onMouseEnter={e => { e.currentTarget.style.color = C.accentLight; e.currentTarget.style.borderColor = C.accentLight; }}
                        onMouseLeave={e => { e.currentTarget.style.color = C.accent; e.currentTarget.style.borderColor = C.accentDark; }}
                      >
                        Anza by ck. →
                      </a>
                    </div>
                    <p style={{ marginTop: "1.5rem", fontSize: 11, color: C.textDim, letterSpacing: "0.05em" }}>{T.footer.copyright}</p>
                  </div>
                </Reveal>
              </section>
            </main>
          </div>
        </LangCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Portfolio />);
  </script>
</body>
</html>
